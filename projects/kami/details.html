<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TERRA — Gabin Goude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--font:'Hanken Grotesk',sans-serif;--dark:#1a1a1a;--mid:#8a8a8a;--border:#e4e4e4;--blue:#3d5af1;--beige:#e8e5de}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:#fff;color:var(--dark);overflow-x:hidden}
    a{color:inherit;text-decoration:none}
    .rv{opacity:0;transform:translateY(60px);transition:opacity 1s cubic-bezier(.16,1,.3,1),transform 1s cubic-bezier(.16,1,.3,1)}
    .rv.vis{opacity:1;transform:translateY(0)}
    .dl1{transition-delay:.08s}.dl2{transition-delay:.16s}.dl3{transition-delay:.24s}
    nav{display:flex;justify-content:space-between;align-items:center;padding:32px 44px}
    .nav-left{font-size:13px}
    .nav-right{display:flex;gap:40px}
    .nav-right a{font-size:14px;transition:opacity .3s;position:relative}
    .nav-right a::after{content:'';position:absolute;left:50%;bottom:-8px;width:5px;height:5px;border-radius:50%;background:var(--dark);transform:translateX(-50%);opacity:0;transition:opacity .3s}
    .nav-right a.active::after{opacity:1}
    .nav-right a:hover{opacity:.4}
    .title-section{padding:100px 44px 80px}
    .title-section h1{font-size:clamp(64px,9vw,140px);font-weight:500;letter-spacing:-.035em;line-height:.92}
    .meta{display:grid;grid-template-columns:1fr 1fr 1fr;padding:0 44px;max-width:1000px}
    .meta-col{padding:24px 0;border-top:1px solid var(--border)}
    .meta-label{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);margin-bottom:20px}
    .meta-value{font-size:15px;line-height:1.7}
    .live-wrap{position:relative;height:0;z-index:10}
    .live-btn{position:absolute;right:44px;top:-70px;width:160px;height:160px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:500;box-shadow:0 16px 50px rgba(61,90,241,.4);transition:transform .4s cubic-bezier(.16,1,.3,1);cursor:pointer;gap:6px}
    .live-btn:hover{transform:scale(1.08)}
    .live-arrow{font-size:20px;transition:transform .3s}
    .live-btn:hover .live-arrow{transform:translate(3px,-3px)}
    .images{padding:100px 44px 0;max-width:1400px;margin:0 auto}
    .img-row{display:grid;grid-template-columns:1fr 1fr;gap:28px;margin-bottom:28px}
    .mockup{background:var(--beige);padding:48px;margin-bottom:28px;overflow:hidden}
    .mockup img{width:100%;display:block;box-shadow:0 6px 30px rgba(0,0,0,.08)}
    .macbook-frame{background:var(--beige);padding:60px 80px 40px;margin-bottom:28px;overflow:hidden}
    .macbook-screen{background:#1a1a1a;border-radius:6px 6px 0 0;overflow:hidden;aspect-ratio:16/10}
    .macbook-screen img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
    .macbook-bar{height:20px;background:linear-gradient(to bottom,#c0c0c0,#a8a8a8);border-radius:0 0 8px 8px;margin:0 -2px}
    .macbook-notch{width:80px;height:4px;background:#888;border-radius:0 0 4px 4px;margin:0 auto}
    .phone-frame{background:var(--beige);padding:60px;margin-bottom:28px;display:flex;justify-content:center;gap:40px}
    .phone{width:280px;background:#1a1a1a;border-radius:32px;padding:12px;box-shadow:0 8px 30px rgba(0,0,0,.1)}
    .phone-screen{border-radius:24px;overflow:hidden;aspect-ratio:9/19.5}
    .phone-screen img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
    .video-placeholder{background:var(--beige);margin-bottom:28px;aspect-ratio:16/9;padding:48px;display:flex;align-items:center;justify-content:center}
    .vp-inner{width:100%;height:100%;background:#d5d0c6;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
    .vp-icon{width:60px;height:60px;border-radius:50%;background:rgba(0,0,0,.06);display:flex;align-items:center;justify-content:center}
    .vp-icon svg{width:24px;height:24px;fill:none;stroke:#999;stroke-width:1.5}
    .vp-text{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:#999}
    .next{padding:140px 44px 100px;border-top:1px solid var(--border);margin-top:100px;text-align:center}
    .next-label{font-size:10.5px;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:20px}
    .next-name{font-size:clamp(52px,8vw,120px);font-weight:500;letter-spacing:-.03em;color:#d4d4d0;transition:color .4s;display:inline-block}
    .next-name:hover{color:var(--dark)}
    footer{padding:36px 44px;border-top:1px solid var(--border);display:flex;justify-content:space-between}
    footer span{font-size:11px;color:var(--mid)}
    @media(max-width:768px){
      nav,.title-section,.meta,.images,.next{padding-left:24px;padding-right:24px}
      .meta{grid-template-columns:1fr}.img-row{grid-template-columns:1fr}
      .macbook-frame{padding:24px 24px 16px}.phone-frame{padding:32px;gap:20px}
      .phone{width:200px}.live-btn{width:120px;height:120px;font-size:14px;right:24px;top:-60px}
      .mockup{padding:24px}footer{padding:24px;flex-direction:column;gap:8px}
    }
  </style>
</head>
<body>

  <nav>
    <span class="nav-left">© Code by Gabin Goude</span>
    <div class="nav-right">
      <a href="../../index.html#work" class="active">Work</a>
      <a href="../../about.html">About</a>
      <a href="../../contact.html">Contact</a>
    </div>
  </nav>

  <div class="title-section">
    <h1 class="rv">TERRA</h1>
  </div>

  <div class="meta">
    <div class="meta-col rv dl1">
      <p class="meta-label">Rôle / Services</p>
      <p class="meta-value">Design & Development</p>
    </div>
    <div class="meta-col rv dl2">
      <p class="meta-label">Contexte</p>
      <p class="meta-value">Cuisine vivante<br>Farm-to-table<br>Paris 3ème</p>
    </div>
    <div class="meta-col rv dl3">
      <p class="meta-label">Année</p>
      <p class="meta-value">Paris, France © 2026</p>
    </div>
  </div>

  <div class="live-wrap">
    <a href="index.html" class="live-btn rv">Live site <span class="live-arrow">↗</span></a>
  </div>

  <div class="images">
    <div class="macbook-frame rv">
      <div class="macbook-screen"><img src="../../assets/images/projects/terra.png" alt="TERRA"></div>
      <div class="macbook-bar"><div class="macbook-notch"></div></div>
    </div>

    <div class="video-placeholder rv">
      <div class="vp-inner">
        <div class="vp-icon"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
        <p class="vp-text">Vidéo de présentation</p>
      </div>
    </div>

    <div class="img-row">
      <div class="mockup rv dl1"><img src="https://images.unsplash.com/photo-1466637574441-749b8f19452f?w=800&q=80" alt="Ingrédients"></div>
      <div class="mockup rv dl2"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=800&q=80" alt="Plat"></div>
    </div>

    <div class="phone-frame rv">
      <div class="phone">
        <div class="phone-screen"><img src="../../assets/images/projects/terra.png" alt="Mobile"></div>
      </div>
      <div class="phone">
        <div class="phone-screen"><img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=400&q=80" alt="Mobile galerie"></div>
      </div>
    </div>

    <div class="video-placeholder rv">
      <div class="vp-inner">
        <div class="vp-icon"><svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg></div>
        <p class="vp-text">Scroll animation vidéo</p>
      </div>
    </div>

    <div class="mockup rv">
      <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?w=1400&q=80" alt="Intérieur">
    </div>

    <div class="img-row">
      <div class="mockup rv dl1"><img src="https://images.unsplash.com/photo-1577219491135-ce391730fb2c?w=800&q=80" alt="Chef"></div>
      <div class="mockup rv dl2"><img src="https://images.unsplash.com/photo-1551218808-94e220e084d2?w=800&q=80" alt="Plat signature"></div>
    </div>
  </div>

  <div class="next rv">
    <p class="next-label">Next Project</p>
    <a href="../restaurant/details.html" class="next-name">Maison Élysée</a>
  </div>

  <footer>
    <span>© Code by Gabin Goude</span>
    <span>2026</span>
  </footer>

  <script>
    var o=new IntersectionObserver(function(e){e.forEach(function(x){if(x.isIntersecting){x.target.classList.add('vis');o.unobserve(x.target)}})},{threshold:.08,rootMargin:'0px 0px -50px 0px'});
    document.querySelectorAll('.rv').forEach(function(el){o.observe(el)});
  </script>
</body>
</html>
