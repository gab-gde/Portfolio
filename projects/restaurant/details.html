<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Maison Élysée — Gabin Goude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--font:'Hanken Grotesk',sans-serif;--dark:#1a1a1a;--mid:#8a8a8a;--light:#e4e4e4;--blue:#3d5af1}
    html{scroll-behavior:smooth}
    body{font-family:var(--font);background:#fff;color:var(--dark);overflow-x:hidden}
    a{color:inherit;text-decoration:none}

    /* NAV */
    .nav{display:flex;justify-content:space-between;align-items:center;padding:32px 44px}
    .nav-left{font-size:13px;color:var(--dark)}
    .nav-right{display:flex;gap:40px}
    .nav-right a{font-size:14px;color:var(--dark);transition:opacity .3s;position:relative}
    .nav-right a::after{content:'';position:absolute;left:50%;bottom:-6px;width:5px;height:5px;border-radius:50%;background:var(--dark);transform:translateX(-50%);opacity:0;transition:opacity .3s}
    .nav-right a.active::after{opacity:1}
    .nav-right a:hover{opacity:.5}

    /* HERO */
    .project-hero{padding:80px 44px 60px;max-width:900px}
    .project-title{font-size:clamp(56px,8vw,120px);font-weight:500;letter-spacing:-.03em;line-height:.95;margin-bottom:60px}

    /* META */
    .project-meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:40px;padding:0 44px 80px;border-bottom:1px solid var(--light);max-width:1100px}
    .meta-col-label{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--mid);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--light)}
    .meta-col-value{font-size:15px;color:var(--dark);line-height:1.7}

    /* LIVE SITE BUTTON */
    .live-btn-wrap{position:relative;margin:80px 44px;display:inline-block}
    .live-btn{display:flex;align-items:center;justify-content:center;width:140px;height:140px;border-radius:50%;background:var(--blue);color:#fff;font-size:15px;font-weight:500;letter-spacing:.02em;transition:transform .3s;box-shadow:0 12px 40px rgba(61,90,241,.35)}
    .live-btn:hover{transform:scale(1.08)}
    .live-btn-arrow{margin-left:6px;font-size:18px;transition:transform .3s}
    .live-btn:hover .live-btn-arrow{transform:translate(3px,-3px)}

    /* IMAGES */
    .project-images{padding:0 44px;max-width:1400px;margin:0 auto}
    .project-img{width:100%;margin-bottom:24px;overflow:hidden;background:#f0ede6}
    .project-img img{width:100%;display:block;transition:transform .6s cubic-bezier(.16,1,.3,1)}
    .project-img:hover img{transform:scale(1.02)}
    .project-img.padded{padding:40px;background:#e8e5de}
    .project-img.padded img{box-shadow:0 8px 40px rgba(0,0,0,.1)}
    .project-img-row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:24px}
    .project-img-row .project-img{margin-bottom:0}

    /* NEXT PROJECT */
    .next-project{padding:120px 44px 80px;border-top:1px solid var(--light);margin-top:120px;text-align:center}
    .next-label{font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:16px}
    .next-name{font-size:clamp(48px,7vw,100px);font-weight:500;letter-spacing:-.03em;color:#d4d4d0;transition:color .4s}
    .next-name:hover{color:var(--dark)}

    /* FOOTER */
    .footer{padding:40px 44px;border-top:1px solid var(--light);display:flex;justify-content:space-between;align-items:center}
    .footer-left{font-size:12px;color:var(--mid)}
    .footer-right{font-size:11px;color:var(--mid)}

    /* REVEAL */
    .r{opacity:0;transform:translateY(40px);transition:opacity .8s cubic-bezier(.16,1,.3,1),transform .8s cubic-bezier(.16,1,.3,1)}
    .r.v{opacity:1;transform:translateY(0)}
    .d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}

    @media(max-width:768px){
      .nav{padding:20px 24px}
      .project-hero{padding:60px 24px 40px}
      .project-meta{grid-template-columns:1fr;padding:0 24px 60px}
      .live-btn-wrap{margin:60px 24px}
      .project-images{padding:0 24px}
      .project-img-row{grid-template-columns:1fr}
      .project-img.padded{padding:20px}
      .next-project{padding:80px 24px 60px}
      .footer{padding:24px;flex-direction:column;gap:12px}
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <span class="nav-left">© Code by Gabin Goude</span>
    <div class="nav-right">
      <a href="../../index.html#work" class="active">Work</a>
      <a href="../../about.html">About</a>
      <a href="../../contact.html">Contact</a>
    </div>
  </nav>

  <!-- PROJECT HERO -->
  <div class="project-hero">
    <h1 class="project-title r">Maison Élysée</h1>
  </div>

  <!-- META -->
  <div class="project-meta">
    <div class="r d1">
      <p class="meta-col-label">Rôle / Services</p>
      <p class="meta-col-value">Design & Development</p>
    </div>
    <div class="r d2">
      <p class="meta-col-label">Contexte</p>
      <p class="meta-col-value">Restaurant gastronomique<br>2 étoiles Michelin<br>Paris 8ème</p>
    </div>
    <div class="r d3">
      <p class="meta-col-label">Année</p>
      <p class="meta-col-value">Paris, France © 2026</p>
    </div>
  </div>

  <!-- LIVE SITE -->
  <div class="live-btn-wrap r">
    <a href="index.html" class="live-btn">Live site <span class="live-btn-arrow">↗</span></a>
  </div>

  <!-- IMAGES -->
  <div class="project-images">
    <div class="project-img padded r">
      <img src="../../assets/images/projects/maison-elysee.png" alt="Maison Élysée — Hero">
    </div>
    <div class="project-img-row">
      <div class="project-img r d1">
        <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800&q=80" alt="Restaurant ambiance">
      </div>
      <div class="project-img r d2">
        <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?w=800&q=80" alt="Intérieur">
      </div>
    </div>
    <div class="project-img padded r">
      <img src="https://images.unsplash.com/photo-1551218808-94e220e084d2?w=1400&q=80" alt="Maison Élysée — Menu">
    </div>
    <div class="project-img-row">
      <div class="project-img r d1">
        <img src="https://images.unsplash.com/photo-1577219491135-ce391730fb2c?w=800&q=80" alt="Chef">
      </div>
      <div class="project-img r d2">
        <img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=800&q=80" alt="Cuisine">
      </div>
    </div>
  </div>

  <!-- NEXT -->
  <div class="next-project r">
    <p class="next-label">Next Project</p>
    <a href="../kami/details.html" class="next-name">TERRA</a>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <span class="footer-left">© Code by Gabin Goude</span>
    <span class="footer-right">Gabin Goude — 2026</span>
  </footer>

  <script>
    var obs=new IntersectionObserver(function(e){e.forEach(function(e){if(e.isIntersecting){e.target.classList.add('v');obs.unobserve(e.target)}})},{threshold:.1,rootMargin:'0px 0px -30px 0px'});
    document.querySelectorAll('.r').forEach(function(el){obs.observe(el)});
  </script>
</body>
</html>
