<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA Studio — Gabin Goude</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--font:'Hanken Grotesk',sans-serif;--dark:#1a1a1a;--mid:#8a8a8a;--border:#e4e4e4;--blue:#3d5af1;--grey-bg:#d2d0cc}
    html{background:#1c1d20}
    body{font-family:var(--font);background:#fff;color:var(--dark);overflow-x:hidden;cursor:none}
    a{color:inherit;text-decoration:none}

    /* ── Custom cursor ── */
    #cur{position:fixed;width:8px;height:8px;background:#fff;border-radius:50%;pointer-events:none;z-index:10000;mix-blend-mode:difference;transition:width .3s,height .3s,opacity .3s}
    #curR{position:fixed;width:28px;height:28px;border:1px solid rgba(255,255,255,.35);border-radius:50%;pointer-events:none;z-index:9999;mix-blend-mode:difference;transition:width .35s,height .35s,opacity .3s}

    /* ── Reveal ── */
    .rv{opacity:0;transform:translateY(50px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1)}
    .rv.vis{opacity:1;transform:translateY(0)}.dl1{transition-delay:.08s}.dl2{transition-delay:.16s}.dl3{transition-delay:.24s}

    /* ── Nav — same as Dennis ── */
    nav{display:flex;justify-content:space-between;align-items:center;padding:32px 48px}
    .logo-wrap{display:flex;align-items:center;gap:5px;cursor:pointer}
    .logo-c{font-size:14px;color:var(--dark);line-height:20px}
    .logo-clip{overflow:hidden;height:20px}
    .logo-slide{transition:transform .5s cubic-bezier(.76,0,.24,1)}
    .logo-wrap:hover .logo-slide{transform:translateY(-20px)}
    .logo-slide p{font-size:14px;color:var(--dark);line-height:20px;height:20px;margin:0;white-space:nowrap}
    .nav-right{display:flex;gap:44px}
    .nav-right a{font-size:14px;transition:opacity .3s;position:relative}
    .nav-right a::after{content:'';position:absolute;left:50%;bottom:-8px;width:5px;height:5px;border-radius:50%;background:var(--dark);transform:translateX(-50%);opacity:0;transition:opacity .3s}
    .nav-right a.active::after{opacity:1}
    .nav-right a:hover{opacity:.4}

    /* ── Title — left aligned like Dennis ── */
    .title-wrap{padding:100px 48px 80px}
    .title-wrap h1{font-size:clamp(60px,9vw,140px);font-weight:400;letter-spacing:-.035em;line-height:.95}

    /* ── Meta — 3 cols, label above line above value ── */
    .meta-wrap{max-width:100%;padding:0 48px;margin-bottom:0}
    .meta{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0}
    .meta-col{padding:28px 0;border-top:1px solid var(--border)}
    .meta-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--mid);margin-bottom:20px}
    .meta-value{font-size:15px;line-height:1.7}

    /* ── Hero image — with margins, Live site button overlaps ── */
    .hero-area{position:relative;padding:0 120px;margin-top:60px}
    .hero-img-container{position:relative;overflow:hidden}
    .hero-img{width:100%;display:block;max-height:65vh;object-fit:cover;will-change:transform}
    .live-btn{
      position:absolute;top:-60px;right:0;
      width:170px;height:170px;border-radius:50%;
      background:var(--blue);color:#fff;
      display:flex;align-items:center;justify-content:center;
      font-size:16px;font-weight:500;gap:6px;
      box-shadow:0 16px 50px rgba(61,90,241,.4);
      cursor:pointer;z-index:10;
      transition:transform .35s cubic-bezier(.16,1,.3,1);will-change:transform;
    }
    .live-btn .arrow{font-size:20px;transition:transform .3s}
    .live-btn:hover .arrow{transform:translate(3px,-3px)}

    /* ── MacBook section — grey bg ── */
    .mac-section{
      background:var(--grey-bg);
      padding:120px 80px 0;
      display:flex;justify-content:center;
      overflow:hidden;
    }
    .mac-wrap{position:relative;width:100%;max-width:1300px;will-change:transform}
    .mac-frame{width:100%;display:block;position:relative;z-index:2;pointer-events:none}
    .mac-media{position:absolute;top:14.8%;left:16.4%;width:67.2%;height:65.2%;object-fit:cover;object-position:top;z-index:1;border-radius:2px}

    /* ── Next project ── */
    .next-wrap{margin-top:0}
    .next-curve{position:relative;height:300px;background:var(--grey-bg);overflow:hidden}
    .next-curve::after{content:'';position:absolute;bottom:-1px;left:-10%;right:-10%;height:100%;background:#1c1d20;border-radius:50% 50% 0 0}
    .next-dark{background:#1c1d20;padding:80px 48px 60px;text-align:center}
    .next-label{font-size:14px;letter-spacing:.06em;color:rgba(255,255,255,.45);margin-bottom:24px}
    .next-title{font-size:clamp(56px,9vw,140px);font-weight:400;letter-spacing:-.035em;color:rgba(255,255,255,.12);display:inline-block;transition:color .5s,transform .7s cubic-bezier(.16,1,.3,1)}
    .next-title:hover{color:rgba(255,255,255,.6)}
    .next-peek{position:relative;max-width:800px;margin:80px auto 0}
    .next-peek-line{height:1px;background:rgba(255,255,255,.1);margin:0 -80px}
    .next-peek-img{height:80px;overflow:hidden;cursor:pointer;transition:height .7s cubic-bezier(.16,1,.3,1),margin-top .7s cubic-bezier(.16,1,.3,1)}
    .next-peek-img:hover{height:400px;margin-top:-320px}
    .next-peek-img img{width:100%;display:block}
    .next-peek-img a{display:block}
    .next-allwork{display:inline-flex;align-items:center;gap:8px;margin-top:60px;padding:16px 36px;border:1px solid rgba(255,255,255,.12);border-radius:100px;color:rgba(255,255,255,.4);font-size:14px;transition:all .4s cubic-bezier(.16,1,.3,1)}
    .next-allwork:hover{border-color:rgba(255,255,255,.35);color:#fff}
    .next-allwork sup{font-size:10px;opacity:.5}
    .next-footer{background:#1c1d20;padding:40px 48px;display:flex;justify-content:space-between;border-top:1px solid rgba(255,255,255,.05)}
    .next-footer span{font-size:11px;color:rgba(255,255,255,.2)}

    @media(max-width:768px){
      nav,.title-wrap,.meta-wrap{padding-left:24px;padding-right:24px}
      .hero-area{padding-left:24px;padding-right:24px}
      .meta{grid-template-columns:1fr}
      .live-btn{width:120px;height:120px;font-size:13px;top:-40px}
      .mac-section{padding:60px 24px 0}
      .next-dark{padding:60px 24px 40px}
      .next-footer{padding:24px;flex-direction:column;gap:8px}
    }
  </style>
  <!-- Instant overlay -->
  <style>#pageOverlay{position:fixed;inset:0;z-index:9998;pointer-events:all;overflow:hidden}.po-bg{position:absolute;left:0;right:0;top:-15%;height:130%;background:#1c1d20;will-change:transform}.po-text-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:2;overflow:hidden}.po-text{font-family:"Hanken Grotesk",sans-serif;font-size:clamp(28px,5vw,64px);font-weight:600;letter-spacing:-.04em;color:#fff;white-space:nowrap;will-change:transform}</style>
  <script>var _po=document.createElement("div");_po.id="pageOverlay";_po.innerHTML='<div class="po-bg"></div><div class="po-text-wrap"><span class="po-text"></span></div>';document.documentElement.appendChild(_po);</script>
</head>
<body>

  <div id="cur"></div>
  <div id="curR"></div>

  <nav>
    <a href="../../index.html" class="logo-wrap">
      <span class="logo-c">©</span>
      <div class="logo-clip"><div class="logo-slide"><p>Code by Gabin</p><p>Gabin Goude</p></div></div>
    </a>
    <div class="nav-right">
      <a href="../../index.html#work" class="active">Work</a>
      <a href="../../about.html">About</a>
      <a href="../../contact.html">Contact</a>
    </div>
  </nav>

  <div class="title-wrap"><h1 class="rv">AURA Studio</h1></div>

  <div class="meta-wrap"><div class="meta">
    <div class="meta-col rv dl1"><p class="meta-label">Rôle / Services</p><p class="meta-value">Design & Development</p></div>
    <div class="meta-col rv dl2"><p class="meta-label">Contexte</p><p class="meta-value">Direction artistique<br>Studio créatif — Paris 11ème</p></div>
    <div class="meta-col rv dl3"><p class="meta-label">Année</p><p class="meta-value">Paris, France © 2026</p></div>
  </div></div>

  <!-- Hero image — side margins, Live site overlapping -->
  <div class="hero-area">
    <a href="index.html" target="_blank" class="live-btn" data-magnetic>Live site <span class="arrow">↗</span></a>
    <div class="hero-img-container rv">
      <img class="hero-img" src="https://images.unsplash.com/photo-1558618666-fcd25c85f82e?w=1600https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1600&q=85q=85" alt="Aurum Stays">
    </div>
  </div>

  <!-- MacBook on grey background -->
  <section class="mac-section rv">
    <div class="mac-wrap">
      <video class="mac-media" src="aura-preview.mp4" autoplay loop muted playsinline></video>
      <img class="mac-frame" src="../../assets/images/macbook.png" alt="MacBook">
    </div>
  </section>

  <!-- Next project -->
  <div class="next-wrap">
    <div class="next-curve"></div>
    <div class="next-dark">
      <p class="next-label rv">Next case</p>
      <a href="../aurum/details.html" class="next-title rv dl1">Aurum Stays</a>
      <div class="next-peek">
        <div class="next-peek-line"></div>
        <div class="next-peek-img rv dl2"><a href="../aurum/details.html"><img src="../../assets/images/projects/aurum-stays.png" alt="Aurum Stays"></a></div>
      </div>
      <div class="rv dl3"><a href="../../index.html#work" class="next-allwork" data-magnetic><span>All work <sup>4</sup></span></a></div>
    </div>
    <footer class="next-footer"><span>© Code by Gabin Goude</span><span>2026</span></footer>
  </div>

  <!-- Lenis smooth scroll + GSAP -->
  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="../../js/page-transition.js"></script>
  <script src="../../js/cursor.js"></script>
  <script src="../../js/menu.js"></script>
  <script>
    /* ── Lenis smooth scroll — the Dennis "heavy" feel ── */
    const lenis = new Lenis({
      duration: 1.2,
      easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); },
      touchMultiplier: 2,
    });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);

    // Sync Lenis with GSAP ScrollTrigger
    gsap.registerPlugin(ScrollTrigger);
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add(function(time) { lenis.raf(time * 1000); });
    gsap.ticker.lagSmoothing(0);

    /* ── Reveal observer ── */
    var o = new IntersectionObserver(function(e) {
      e.forEach(function(x) { if (x.isIntersecting) { x.target.classList.add('vis'); o.unobserve(x.target); } });
    }, { threshold: .06, rootMargin: '0px 0px -40px 0px' });
    document.querySelectorAll('.rv').forEach(function(el) { o.observe(el); });

    /* ── Parallax on hero image ── */
    gsap.to('.hero-img', {
      yPercent: -12,
      ease: 'none',
      scrollTrigger: {
        trigger: '.hero-img-container',
        start: 'top bottom',
        end: 'bottom top',
        scrub: true
      }
    });

    /* ── MacBook subtle parallax (floats up slightly) ── */
    gsap.fromTo('.mac-wrap', 
      { yPercent: 8 },
      {
        yPercent: -4,
        ease: 'none',
        scrollTrigger: {
          trigger: '.mac-section',
          start: 'top bottom',
          end: 'bottom top',
          scrub: true
        }
      }
    );

    /* ── Live site button parallax (floats) ── */
    gsap.to('.live-btn', {
      y: -40,
      ease: 'none',
      scrollTrigger: {
        trigger: '.hero-area',
        start: 'top bottom',
        end: 'bottom top',
        scrub: true
      }
    });

    /* ── Magnetic buttons ── */
    document.querySelectorAll('[data-magnetic]').forEach(function(btn) {
      btn.addEventListener('mousemove', function(e) {
        var r = btn.getBoundingClientRect();
        var x = e.clientX - r.left - r.width / 2;
        var y = e.clientY - r.top - r.height / 2;
        gsap.to(btn, { x: x * 0.4, y: y * 0.4, duration: 0.4, ease: 'power3.out' });
      });
      btn.addEventListener('mouseleave', function() {
        gsap.to(btn, { x: 0, y: 0, duration: 0.7, ease: 'elastic.out(1, 0.3)' });
      });
    });
  </script>
</body>
</html>
